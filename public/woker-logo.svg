<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0d0d1a" rx="32"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="210" r="105" fill="none" stroke="#39ff6e" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="210" r="118" fill="none" stroke="#39ff6e" stroke-width="0.8" opacity="0.15"/>

  <!-- Brain - geometric left hemisphere -->
  <path d="
    M 200 150
    C 180 135, 155 140, 148 158
    C 140 170, 143 185, 150 195
    C 140 200, 132 212, 135 228
    C 138 244, 152 252, 165 250
    C 165 262, 172 272, 183 274
    C 192 276, 200 270, 204 262
    L 210 270
    L 210 150
    Z
  " fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" opacity="0.92"/>

  <!-- Brain - geometric right hemisphere -->
  <path d="
    M 312 150
    C 332 135, 357 140, 364 158
    C 372 170, 369 185, 362 195
    C 372 200, 380 212, 377 228
    C 374 244, 360 252, 347 250
    C 347 262, 340 272, 329 274
    C 320 276, 312 270, 308 262
    L 302 270
    L 302 150
    Z
  " fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" opacity="0.92"/>

  <!-- Brain center divider -->
  <line x1="256" y1="148" x2="256" y2="272" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

  <!-- Brain internal details - left -->
  <path d="M 185 175 C 195 168, 205 172, 210 180" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <path d="M 175 205 C 188 198, 200 202, 210 210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <path d="M 178 232 C 190 226, 202 228, 210 235" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

  <!-- Brain internal details - right -->
  <path d="M 327 175 C 317 168, 307 172, 302 180" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <path d="M 337 205 C 324 198, 312 202, 302 210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <path d="M 334 232 C 322 226, 310 228, 302 235" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

  <!-- Lightning bolt - main (red, prominent, slashing through brain) -->
  <polygon points="
    268,130
    238,218
    258,218
    244,300
    282,200
    260,200
    282,130
  " fill="#e63920" opacity="0.95"/>

  <!-- Lightning bolt - inner highlight -->
  <polygon points="
    268,140
    244,215
    261,215
    249,288
    277,205
    257,205
    277,140
  " fill="#ff6b4a" opacity="0.6"/>

  <!-- Green accent dots (circuit nodes) -->
  <circle cx="155" cy="195" r="5" fill="#39ff6e" opacity="0.8"/>
  <circle cx="357" cy="195" r="5" fill="#39ff6e" opacity="0.8"/>
  <circle cx="165" cy="250" r="4" fill="#39ff6e" opacity="0.6"/>
  <circle cx="347" cy="250" r="4" fill="#39ff6e" opacity="0.6"/>
  <circle cx="256" cy="130" r="6" fill="#39ff6e" opacity="0.9"/>

  <!-- Green circuit lines -->
  <line x1="256" y1="136" x2="256" y2="148" stroke="#39ff6e" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="195" x2="148" y2="195" stroke="#39ff6e" stroke-width="1.5" opacity="0.5"/>
  <line x1="357" y1="195" x2="364" y2="195" stroke="#39ff6e" stroke-width="1.5" opacity="0.5"/>

  <!-- Text WOKER -->
  <text
    x="256"
    y="365"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="72"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="12"
  >WOKER</text>

  <!-- Tagline -->
  <text
    x="256"
    y="400"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="18"
    fill="#39ff6e"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.85"
  >AI · SWISS JOBS</text>

  <!-- Bottom accent line -->
  <line x1="156" y1="415" x2="356" y2="415" stroke="#e63920" stroke-width="2" opacity="0.6"/>
  <line x1="206" y1="420" x2="306" y2="420" stroke="#39ff6e" stroke-width="1" opacity="0.4"/>
</svg>
